services:
  bot:
    build: .
    env_file:
      - .env
    environment:
      - TG_PROXY=socks5://host.docker.internal:10808
    volumes:
      - ./bot/logs:/app/logs
    network_mode: host
    restart: unless-stopped

  webhook:
    build:
      context: .
      dockerfile: webhook/Dockerfile.webhook
    container_name: deploy-webhook
    restart: always
    working_dir: /app
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .env
    ports:
      - "9000:9000"
    command: python webhook/webhook.py
    networks:
      - bot-network

networks:
  bot-network:
    driver: bridge
